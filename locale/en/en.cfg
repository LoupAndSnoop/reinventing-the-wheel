[mod-setting-name]
rtw-duplicate-count=Duplicate count
rtw-prerequisite-chance=Duplicate prerequisite chance
rtw-prerequisite-seed=Prerequisite seed


[mod-setting-description]
rtw-duplicate-count=Number of duplicate technologies to make per technology. 1 duplicate = there are 2 technologies that do that same thing.
rtw-prerequisite-seed=The seed for randomly determining which duplicates should actually be prerequisites.
rtw-prerequisite-chance=% chance that a given technology requires a given duplicate of another technology. 50 = 50% chance. If you have 10 duplicates on 50% chance, then a technology with 1 dupe-able prereq will have +5 prerequisites being required. Be careful setting with the number of duplicates!